# cert-manager is cluster-wide; controllers may run on any node (not pinned).
crds:
  enabled: true
replicaCount: 1
resources:
  requests:
    cpu: 10m
    memory: 64Mi
webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
